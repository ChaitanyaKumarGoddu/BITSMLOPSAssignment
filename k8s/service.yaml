# Task 7 — Service exposing the API via a LoadBalancer.
# On Docker Desktop Kubernetes a LoadBalancer service is reachable at
# http://localhost:8000 . On Minikube use `minikube service` or NodePort.
apiVersion: v1
kind: Service
metadata:
  name: heart-disease-api-service
  labels:
    app: heart-disease-api
spec:
  type: LoadBalancer
  selector:
    app: heart-disease-api
  ports:
    - name: http
      protocol: TCP
      port: 8000        # external port
      targetPort: 8000  # container port
