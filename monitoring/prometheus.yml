# Prometheus scrape configuration for the Heart Disease API.
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "heart-disease-api"
    metrics_path: /metrics
    static_configs:
      # 'api' is the docker-compose service name; use the pod/service DNS
      # name (heart-disease-api-service:80) when scraping inside Kubernetes.
      - targets: ["api:8000"]
        labels:
          service: "heart-disease-api"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
